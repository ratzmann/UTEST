<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script src="../js/acessibilidade.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTEST - Login Aluno</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/loginAluno.css">
    <link rel="stylesheet" href="../css/acessibilidade.css">
</head>
<body>
    <div class="barra-acessibilidade">
        <button id="btnDiminuirFonte" aria-label="Diminuir fonte">A-</button>
        <button id="btnAumentarFonte" aria-label="Aumentar fonte">A+</button>
        <button id="btnAlternarTema" aria-label="Alternar modo escuro">Modo escuro</button>
    </div>
    <main class="container">
        <div class="brand">
            <img src="../img/logo.png" alt="Logo UTEST" class="logo">
            <h1></h1>
        </div>
        
        <div class="login-card">
            <h2>Olá, aluno!</h2>
            <p>Informe seus dados para começar a prova</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email institucional</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <p id="mensagemErro" class="mensagem-erro" style="display:none;"></p>

                <button type="submit" class="btn-submit">Começar</button>
            </form>
        </div>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/loginAluno.js"></script>
</body>
</html>
