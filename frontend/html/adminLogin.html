<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script src="../js/acessibilidade.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTEST - Acesso Administrativo</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/loginProfessor.css">
    <link rel="stylesheet" href="../css/acessibilidade.css">
</head>
<body>
    <div class="barra-acessibilidade">
        <button id="btnDiminuirFonte" aria-label="Diminuir fonte">A-</button>
        <button id="btnAumentarFonte" aria-label="Aumentar fonte">A+</button>
        <button id="btnAlternarTema" aria-label="Alternar modo escuro">Modo escuro</button>
    </div>
    <main class="container">
        <div class="brand">
            <img src="../img/logo.png" alt="Logo UTEST" class="logo">
            <h1></h1>
        </div>

        <div class="login-card">
            <h2>Área administrativa</h2>
            <p>Acesso restrito para gestão dos usuários cadastrados</p>

            <form id="adminLoginForm">
                <div class="input-group">
                    <label for="chaveAdmin">Chave de acesso</label>
                    <input type="password" id="chaveAdmin" name="chaveAdmin" required autocomplete="off">
                </div>

                <p id="mensagemErro" class="mensagem-erro" style="display:none;"></p>

                <button type="submit" class="btn-submit">Entrar</button>
            </form>

            <p class="link-secundario">
                <a href="loginProfessor.html">Voltar</a>
            </p>
        </div>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/adminLogin.js"></script>
</body>
</html>
