services:

  db:
    image: postgres:16-alpine
    container_name: utest_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-utest_db}
      POSTGRES_USER: ${DB_USER:-utest_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-utest_password}
    volumes:
      - utest_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-utest_user} -d ${DB_NAME:-utest_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: utest_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-utest_db}
      DB_USER: ${DB_USER:-utest_user}
      DB_PASSWORD: ${DB_PASSWORD:-utest_password}
      JWT_SECRET: ${JWT_SECRET:-troque-esta-chave-por-uma-bem-longa-e-aleatoria-antes-de-usar-em-producao}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      ALUNO_DOMINIO_INSTITUCIONAL: ${ALUNO_DOMINIO_INSTITUCIONAL:-@edu.udesc.br}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081}
      ADMIN_SECRET: ${ADMIN_SECRET:-utest-admin-2026}
      PORT: 8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: utest_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  utest_postgres_data:
